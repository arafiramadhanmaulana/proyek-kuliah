<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Rekomendasi Paket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: -8px; left: 0; font-size: 11px; color: #4f46e5; font-weight: 600;
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #4338ca 0%, #6366f1 100%);
            transition: all 0.3s;
        }
        .btn-gradient:hover {
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex">

    <div class="hidden lg:flex w-1/2 bg-indigo-900 relative items-center justify-center overflow-hidden">
        <div class="absolute inset-0">
            <img src="https://images.unsplash.com/photo-1557804506-669a67965ba0?q=80&w=2574&auto=format&fit=crop" 
                 class="w-full h-full object-cover opacity-50 mix-blend-overlay" alt="Technology Background">
            <div class="absolute inset-0 bg-gradient-to-t from-indigo-900 via-indigo-900/60 to-transparent"></div>
        </div>

        <div class="relative z-10 px-12 text-white max-w-lg">
            <div class="w-14 h-14 bg-white/10 backdrop-blur-md border border-white/20 rounded-xl flex items-center justify-center mb-6 shadow-lg">
                <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold mb-4 leading-tight tracking-tight">Sistem Rekomendasi Paket</h1>
            <p class="text-indigo-100 text-base leading-relaxed opacity-90">
                Temukan paket internet yang paling pas dengan budget dan kebutuhan kuota Anda
            </p>
        </div>
    </div>

    <div class="w-full lg:w-1/2 flex items-center justify-center p-6 bg-white relative">
        <div class="w-full max-w-sm fade-in">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Selamat Datang</h2>
                <p class="text-sm text-gray-500 mt-1">Silakan isi data diri untuk masuk ke dashboard.</p>
            </div>

            <form action="/dashboard" method="POST" class="space-y-6">
                <div class="input-group relative">
                    <input type="text" name="nama" id="nama" required placeholder=" " 
                        class="block w-full border-b-2 border-gray-200 py-2.5 text-sm font-semibold text-gray-900 focus:border-indigo-600 focus:outline-none transition-colors bg-transparent peer">
                    <label for="nama" class="absolute left-0 top-2.5 text-sm text-gray-500 transition-all duration-300 pointer-events-none">Nama Pengguna</label>
                </div>

                <div class="input-group relative">
                    <input type="number" name="no_hp" id="no_hp" required placeholder=" " 
                        class="block w-full border-b-2 border-gray-200 py-2.5 text-sm font-semibold text-gray-900 focus:border-indigo-600 focus:outline-none transition-colors bg-transparent peer">
                    <label for="no_hp" class="absolute left-0 top-2.5 text-sm text-gray-500 transition-all duration-300 pointer-events-none">Nomor Telepon</label>
                </div>

                <div class="pt-2">
                    <button type="submit" class="btn-gradient w-full py-3 rounded-xl text-white font-bold text-sm shadow-md hover:shadow-lg transition-all transform active:scale-95">
                        Masuk Dashboard
                    </button>
                </div>
            </form>

            <div class="mt-10 border-t border-gray-100 pt-6">
                <p class="text-center text-[10px] text-gray-400 font-medium">
                    © Kelompok 10 Project Sains Data RB
                </p>
            </div>
        </div>
    </div>

</body>
</html>
